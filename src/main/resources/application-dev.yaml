server:
  port: 8511

spring:
  application:
    name: ai-wealth-platform
  config:
    # 开发机凭据从 Git 忽略的本地文件读取，CI/CD 可继续使用环境变量覆盖。
    import: optional:file:./config/application-secrets.yaml

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dz_database?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      connection-init-sqls:
        - SET time_zone = '+08:00'
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:dzcom-investment-task-worker}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record

  # Flyway配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# SpringDoc & Swagger UI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/api/**'
      packages-to-scan: com.example.dzcom.interfaces.controller

# Knife4j 独立 UI 开关；OpenAPI 数据由 SpringDoc 3 生成。
knife4j:
  enable: true

# 日志配置
logging:
  level:
    com.example.dzcom: DEBUG
    # dev SQL 日志默认关闭；需要排查 SQL 时设置 DEV_SQL_LOG_LEVEL=DEBUG。
    com.example.dzcom.infrastructure.persistence.mapper: ${DEV_SQL_LOG_LEVEL:INFO}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  wealth:
    closed-loop:
      running-timeout-minutes: ${CLOSED_LOOP_RUNNING_TIMEOUT_MINUTES:30}
    task:
      running-timeout-minutes: ${INVESTMENT_TASK_RUNNING_TIMEOUT_MINUTES:30}

investment:
  tasks:
    enabled: ${INVESTMENT_TASKS_ENABLED:true}
    topic: ${INVESTMENT_TASK_TOPIC:dzcom.investment.task.trigger.v1}
    definitions:
      - code: llm-data-collection-multi-source
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_DATA_COLLECTION_MULTI_SOURCE_CRON:0 0 */6 * * *}
        enabled: ${LLM_DATA_COLLECTION_MULTI_SOURCE_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: MARKET_QUOTE,NEWS,ANNOUNCEMENT,RESEARCH,REGULATORY
          topicKeywords: ""
          collectionDirection: MULTI_SOURCE
          skillCode: DATA_COLLECTION_MULTI_SOURCE
          preferredTrustLevels: L1,L2,L3,L4
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-official-disclosure-collection
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_OFFICIAL_DISCLOSURE_COLLECTION_CRON:0 10 */6 * * *}
        enabled: ${LLM_OFFICIAL_DISCLOSURE_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: ANNOUNCEMENT,REGULATORY
          topicKeywords: 交易所公告,信息披露,产品公告
          collectionDirection: OFFICIAL_DISCLOSURE
          skillCode: DATA_COLLECTION_OFFICIAL_DISCLOSURE
          preferredTrustLevels: L1,L2
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-news-research-collection
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_NEWS_RESEARCH_COLLECTION_CRON:0 20 */6 * * *}
        enabled: ${LLM_NEWS_RESEARCH_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: NEWS,RESEARCH
          topicKeywords: 财经新闻,研报,机构观点,市场事件
          collectionDirection: NEWS_RESEARCH
          skillCode: DATA_COLLECTION_NEWS_RESEARCH
          preferredTrustLevels: L2,L3,L4
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-product-nav-collection
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_PRODUCT_NAV_COLLECTION_CRON:0 30 */6 * * *}
        enabled: ${LLM_PRODUCT_NAV_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: BANK_WMP,FUND,ETF
          dataTypes: MARKET_QUOTE
          topicKeywords: 理财产品,基金净值,ETF净值,产品风险等级
          collectionDirection: PRODUCT_NAV
          skillCode: DATA_COLLECTION_PRODUCT_NAV
          preferredTrustLevels: L1,L2,L3
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-market-quote-collection
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_MARKET_QUOTE_COLLECTION_CRON:0 40 */6 * * *}
        enabled: ${LLM_MARKET_QUOTE_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: MARKET_QUOTE
          topicKeywords: 行情,指数,估值,收益率,波动率
          collectionDirection: MARKET_QUOTE
          skillCode: DATA_COLLECTION_MARKET_QUOTE
          preferredTrustLevels: L1,L2,L3
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-regulatory-collection
        type: AI_DATA_SOURCE_DISCOVERY
        cron: ${LLM_REGULATORY_COLLECTION_CRON:0 50 */6 * * *}
        enabled: ${LLM_REGULATORY_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: REGULATORY
          topicKeywords: 监管政策,处罚,风险提示,制度变化
          collectionDirection: REGULATORY
          skillCode: DATA_COLLECTION_REGULATORY
          preferredTrustLevels: L1
          candidateLimit: "4"
          includeDisabledCandidates: "true"
          autoRegisterCandidates: "true"
          autoEnableCandidates: "true"
          autoEnableReviewRequiredCandidates: "true"
          autoEnableTrustLevels: L1,L2,L3
      - code: llm-structured-core-data-collection
        type: AI_STRUCTURED_DATA_COLLECTION
        cron: ${LLM_STRUCTURED_CORE_DATA_COLLECTION_CRON:0 5 */2 * * *}
        enabled: ${LLM_STRUCTURED_CORE_DATA_COLLECTION_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          environment: DEFAULT
          scenarioCode: DATA_SOURCE_DISCOVERY
          skillCode: AI_STRUCTURED_DATA_COLLECTION_CORE
          marketScope: CN_MAINLAND
          assetClass: MULTI_ASSET
          dataTypes: MARKET_QUOTE,NEWS,ANNOUNCEMENT,RESEARCH,REGULATORY
          topicKeywords: AI人工智能,半导体,黄金,基金净值,ETF净值,监管政策,财经新闻
          maxNews: "18"
          maxProducts: "12"
          maxQuotes: "36"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: real-product-universe-sync
        type: REAL_PRODUCT_UNIVERSE_SYNC
        cron: ${REAL_PRODUCT_UNIVERSE_SYNC_CRON:0 30 8 * * *}
        enabled: ${REAL_PRODUCT_UNIVERSE_SYNC_ENABLED:true}
        zone: Asia/Shanghai
        parameters:
          sourceCode: ${REAL_MARKET_SOURCE_CODE:EASTMONEY_PUBLIC}
          providerBaseUrl: ${AKSHARE_PROVIDER_BASE_URL:${REAL_MARKET_PROVIDER_BASE_URL:}}
          marketScope: CN_MAINLAND
          defaultCurrency: CNY
          defaultRiskLevel: "3"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          lookbackDays: "10"
          timeoutSeconds: "12"
      - code: real-market-quote-sync
        type: REAL_MARKET_QUOTE_SYNC
        cron: ${REAL_MARKET_QUOTE_SYNC_CRON:0 30 17 * * *}
        enabled: ${REAL_MARKET_QUOTE_SYNC_ENABLED:true}
        zone: Asia/Shanghai
        parameters:
          sourceCode: ${REAL_MARKET_SOURCE_CODE:EASTMONEY_PUBLIC}
          providerBaseUrl: ${AKSHARE_PROVIDER_BASE_URL:${REAL_MARKET_PROVIDER_BASE_URL:}}
          marketScope: CN_MAINLAND
          quoteInterval: 1D
          lookbackDays: "10"
          timeoutSeconds: "20"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: real-news-sync
        type: REAL_NEWS_SYNC
        cron: ${REAL_NEWS_SYNC_CRON:0 0 */2 * * *}
        enabled: ${REAL_NEWS_SYNC_ENABLED:true}
        zone: Asia/Shanghai
        parameters:
          sourceCode: ${REAL_NEWS_SOURCE_CODE:EASTMONEY_NEWS}
          providerBaseUrl: ${AKSHARE_PROVIDER_BASE_URL:${REAL_NEWS_PROVIDER_BASE_URL:${REAL_MARKET_PROVIDER_BASE_URL:}}}
          marketScope: CN_MAINLAND
          keywords: ${HOT_INVESTMENT_NEWS_KEYWORDS:AI,人工智能,算力,大模型,半导体,芯片,集成电路,黄金,金价,贵金属}
          lookbackDays: "3"
          maxItems: "100"
          timeoutSeconds: "20"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: real-data-quality-snapshot
        type: REAL_DATA_QUALITY_SNAPSHOT
        cron: ${REAL_DATA_QUALITY_SNAPSHOT_CRON:0 10 * * * *}
        enabled: ${REAL_DATA_QUALITY_SNAPSHOT_ENABLED:true}
        zone: Asia/Shanghai
        parameters:
          marketScope: CN_MAINLAND
          freshnessHours: "72"
          minNewsCount: "20"
          minRealDataQualityScore: "0.60"
          keywords: ${HOT_INVESTMENT_NEWS_KEYWORDS:AI,人工智能,算力,大模型,半导体,芯片,集成电路,黄金,金价,贵金属}
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: cn-mainland-market-momentum-scan
        type: MARKET_MOMENTUM_SCAN
        cron: ${MARKET_MOMENTUM_CRON:0 20 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "60"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: cn-mainland-hot-theme-return
        type: HOT_THEME_RETURN
        cron: ${HOT_THEME_RETURN_CRON:0 25 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: cn-mainland-news-heat-aggregation
        type: NEWS_HEAT_AGGREGATION
        cron: ${NEWS_HEAT_CRON:0 30 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_KEYWORDS:AI人工智能=AI,人工智能,算力,大模型;半导体=半导体,芯片,集成电路,晶圆;黄金=黄金,金价,贵金属,避险}
          themeProducts: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: auto-openai-investment-report-generation
        type: AUTO_INVESTMENT_REPORT_GENERATION
        cron: ${AUTO_INVESTMENT_REPORT_CRON:0 30 20 * * *}
        enabled: ${AUTO_INVESTMENT_REPORT_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          providerCode: OPENAI_COMPATIBLE
          modelCode: ${AUTO_INVESTMENT_REPORT_MODEL:openai-compatible-analysis}
          marketScope: CN_MAINLAND
          lookbackDays: "30"
          initialCapital: "100000"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: auto-prompt-governance
        type: AUTO_PROMPT_GOVERNANCE
        cron: ${AUTO_PROMPT_GOVERNANCE_CRON:0 20 */2 * * *}
        enabled: ${AUTO_PROMPT_GOVERNANCE_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          promptCode: investment-plan-from-report
          promptVersion: auto-v1
          scenario: INVESTMENT_PLAN
          reportSampleSize: "20"
      - code: auto-investment-closed-loop-orchestration
        type: AUTO_INVESTMENT_CLOSED_LOOP_ORCHESTRATION
        cron: ${AUTO_INVESTMENT_CLOSED_LOOP_CRON:0 0 21 * * *}
        enabled: ${AUTO_INVESTMENT_CLOSED_LOOP_ENABLED:false}
        zone: Asia/Shanghai
        parameters:
          automationLevel: FULL_MOCK
          marketScope: CN_MAINLAND
          mockUserBizId: ${AUTO_INVESTMENT_MOCK_USER_BIZ_ID:21000000-0000-0000-0000-000000000002}
          mockPortfolioName: 全自动闭环模拟组合
          initialCash: "100000"
          minQualityScore: "0.45"
          allowAutoMockTrade: "true"
          allowPromptCandidate: "true"
          allowModelCandidate: "true"
          allowAutoPromptActivation: "false"
          allowAutoModelActivation: "false"
          allowRealTrade: "false"
          requireStructuredCoreData: "true"
          minStructuredNewsCount: "1"
          minStructuredQuoteCount: "1"
          minRealDataQualityScore: "0.60"
          dataTaskCodes: real-product-universe-sync,real-market-quote-sync,real-news-sync,real-data-quality-snapshot,cn-mainland-market-momentum-scan,cn-mainland-hot-theme-return,cn-mainland-news-heat-aggregation
          reportTaskCode: auto-openai-investment-report-generation
          promptTaskCode: auto-prompt-governance
          modelCode: ${AUTO_INVESTMENT_REPORT_MODEL:openai-compatible-analysis}
          providerCode: OPENAI_COMPATIBLE
          lookbackDays: "30"
          themeCodes: ""
          maxReportsForMock: "20"
