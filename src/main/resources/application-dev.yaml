server:
  port: 8511

spring:
  application:
    name: ai-wealth-platform
  config:
    # 开发机凭据从 Git 忽略的本地文件读取，CI/CD 可继续使用环境变量覆盖。
    import: optional:file:./config/application-secrets.yaml

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dz_database?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      connection-init-sqls:
        - SET time_zone = '+08:00'
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:dzcom-investment-task-worker}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record

  # Flyway配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# SpringDoc & Swagger UI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/api/**'
      packages-to-scan: com.example.dzcom.interfaces.controller

# Knife4j 独立 UI 开关；OpenAPI 数据由 SpringDoc 3 生成。
knife4j:
  enable: true

# 日志配置
logging:
  level:
    com.example.dzcom: DEBUG
    com.example.dzcom.infrastructure.persistence.mapper: DEBUG

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

investment:
  tasks:
    enabled: ${INVESTMENT_TASKS_ENABLED:true}
    topic: ${INVESTMENT_TASK_TOPIC:dzcom.investment.task.trigger.v1}
    definitions:
      - code: l1-regulatory-disclosure-collection
        type: REGULATORY_DISCLOSURE_COLLECTION
        cron: ${L1_REGULATORY_NEWS_CRON:0 */30 * * * *}
        zone: Asia/Shanghai
        parameters:
          endpoints: ${L1_REGULATORY_ENDPOINTS:}
          responseFormat: ${L1_REGULATORY_RESPONSE_FORMAT:JSON}
          itemsPath: ${L1_REGULATORY_ITEMS_PATH:}
          externalIdPath: ${L1_REGULATORY_EXTERNAL_ID_PATH:id}
          titlePath: ${L1_REGULATORY_TITLE_PATH:title}
          summaryPath: ${L1_REGULATORY_SUMMARY_PATH:summary}
          contentPath: ${L1_REGULATORY_CONTENT_PATH:content}
          urlPath: ${L1_REGULATORY_URL_PATH:url}
          publishTimePath: ${L1_REGULATORY_PUBLISH_TIME_PATH:publishTime}
          extraFieldPaths: ${L1_REGULATORY_EXTRA_FIELD_PATHS:}
          sourceCode: CSRC
          articleType: REGULATORY
          languageCode: zh-CN
          maxItems: "80"
          timeoutSeconds: "20"
          freshnessHours: "72"
      - code: l1-exchange-announcement-collection
        type: EXCHANGE_ANNOUNCEMENT_COLLECTION
        cron: ${L1_EXCHANGE_ANNOUNCEMENT_CRON:0 */20 * * * *}
        zone: Asia/Shanghai
        parameters:
          endpoints: ${L1_EXCHANGE_ANNOUNCEMENT_ENDPOINTS:}
          responseFormat: ${L1_EXCHANGE_ANNOUNCEMENT_RESPONSE_FORMAT:JSON}
          itemsPath: ${L1_EXCHANGE_ANNOUNCEMENT_ITEMS_PATH:}
          externalIdPath: ${L1_EXCHANGE_ANNOUNCEMENT_EXTERNAL_ID_PATH:id}
          titlePath: ${L1_EXCHANGE_ANNOUNCEMENT_TITLE_PATH:title}
          summaryPath: ${L1_EXCHANGE_ANNOUNCEMENT_SUMMARY_PATH:summary}
          contentPath: ${L1_EXCHANGE_ANNOUNCEMENT_CONTENT_PATH:content}
          urlPath: ${L1_EXCHANGE_ANNOUNCEMENT_URL_PATH:url}
          publishTimePath: ${L1_EXCHANGE_ANNOUNCEMENT_PUBLISH_TIME_PATH:publishTime}
          extraFieldPaths: ${L1_EXCHANGE_ANNOUNCEMENT_EXTRA_FIELD_PATHS:}
          sourceCode: CNINFO
          articleType: ANNOUNCEMENT
          languageCode: zh-CN
          maxItems: "100"
          timeoutSeconds: "20"
          freshnessHours: "72"
      - code: l2-wealth-product-nav-refresh
        type: WEALTH_PRODUCT_NAV_REFRESH
        cron: ${L2_WEALTH_PRODUCT_CRON:0 0 */2 * * *}
        zone: Asia/Shanghai
        parameters:
          endpoints: ${L2_WEALTH_PRODUCT_ENDPOINTS:}
          responseFormat: ${L2_WEALTH_PRODUCT_RESPONSE_FORMAT:JSON}
          itemsPath: ${L2_WEALTH_PRODUCT_ITEMS_PATH:}
          externalIdPath: ${L2_WEALTH_PRODUCT_EXTERNAL_ID_PATH:id}
          titlePath: ${L2_WEALTH_PRODUCT_TITLE_PATH:productName}
          summaryPath: ${L2_WEALTH_PRODUCT_SUMMARY_PATH:summary}
          contentPath: ${L2_WEALTH_PRODUCT_CONTENT_PATH:content}
          urlPath: ${L2_WEALTH_PRODUCT_URL_PATH:url}
          publishTimePath: ${L2_WEALTH_PRODUCT_PUBLISH_TIME_PATH:publishTime}
          extraFieldPaths: ${L2_WEALTH_PRODUCT_EXTRA_FIELD_PATHS:productCode=productCode;productName=productName;nav=nav;previousNav=previousNav;assetSize=assetSize;riskLevel=riskLevel}
          sourceCode: CHINA_WEALTH
          articleType: WEALTH_NAV
          languageCode: zh-CN
          maxItems: "100"
          timeoutSeconds: "20"
          freshnessHours: "168"
          productMarketCode: BANK_WMP
          productCurrency: CNY
          quoteInterval: 1D
          defaultRiskLevel: "2"
      - code: cn-mainland-market-momentum-scan
        type: MARKET_MOMENTUM_SCAN
        cron: ${MARKET_MOMENTUM_CRON:0 */5 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "60"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: cn-mainland-hot-theme-return
        type: HOT_THEME_RETURN
        cron: ${HOT_THEME_RETURN_CRON:30 */10 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: cn-mainland-news-heat-aggregation
        type: NEWS_HEAT_AGGREGATION
        cron: ${NEWS_HEAT_CRON:45 */10 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_KEYWORDS:AI人工智能=AI,人工智能,算力,大模型;半导体=半导体,芯片,集成电路,晶圆;黄金=黄金,金价,贵金属,避险}
          themeProducts: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
          themeMarketScopes: ${HOT_INVESTMENT_THEME_SCOPES:AI人工智能=CN_MAINLAND;半导体=CN_MAINLAND;黄金=CN_MAINLAND}
      - code: auto-openai-investment-report-generation
        type: AUTO_INVESTMENT_REPORT_GENERATION
        cron: ${AUTO_INVESTMENT_REPORT_CRON:0 5 */1 * * *}
        zone: Asia/Shanghai
        parameters:
          providerCode: OPENAI_COMPATIBLE
          modelCode: ${AUTO_INVESTMENT_REPORT_MODEL:openai-compatible-analysis}
          marketScope: CN_MAINLAND
          lookbackDays: "30"
          initialCapital: "100000"
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: auto-prompt-governance
        type: AUTO_PROMPT_GOVERNANCE
        cron: ${AUTO_PROMPT_GOVERNANCE_CRON:0 20 */2 * * *}
        zone: Asia/Shanghai
        parameters:
          promptCode: investment-plan-from-report
          promptVersion: auto-v1
          scenario: INVESTMENT_PLAN
          reportSampleSize: "20"
