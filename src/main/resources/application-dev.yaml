server:
  port: 8511

spring:
  application:
    name: ai-wealth-platform
  config:
    # 开发机凭据从 Git 忽略的本地文件读取，CI/CD 可继续使用环境变量覆盖。
    import: optional:file:./config/application-secrets.yaml

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dz_database?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      connection-init-sqls:
        - SET time_zone = '+08:00'
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:dzcom-investment-task-worker}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record

  # Flyway配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# SpringDoc & Swagger UI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/api/**'
      packages-to-scan: com.example.dzcom.interfaces.controller

# Knife4j 独立 UI 开关；OpenAPI 数据由 SpringDoc 3 生成。
knife4j:
  enable: true

# 日志配置
logging:
  level:
    com.example.dzcom: DEBUG
    com.example.dzcom.infrastructure.persistence.mapper: DEBUG

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

investment:
  tasks:
    enabled: ${INVESTMENT_TASKS_ENABLED:true}
    topic: ${INVESTMENT_TASK_TOPIC:dzcom.investment.task.trigger.v1}
    definitions:
      - code: investment-news-collection
        type: INVESTMENT_NEWS_COLLECTION
        cron: ${NEWS_COLLECTION_CRON:0 */10 * * * *}
        zone: Asia/Shanghai
        parameters:
          feedUrls: ${INVESTMENT_NEWS_FEEDS:}
          sourceCode: CN_MAINLAND_NEWS
          languageCode: zh-CN
          maxItems: "50"
          fallbackArticles: ${INVESTMENT_FALLBACK_ARTICLES:AI人工智能|人工智能主题关注度提升|算力、模型应用和国产软件方向持续受到中国大陆投资者关注;半导体|半导体产业链景气跟踪|芯片设备、材料和晶圆制造环节维持较高市场热度;黄金|黄金资产避险需求升温|贵金属价格波动加大，黄金 ETF 相关产品关注度提升}
      - code: hot-theme-return
        type: HOT_THEME_RETURN
        cron: ${HOT_THEME_RETURN_CRON:30 */5 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: market-momentum-scan
        type: MARKET_MOMENTUM_SCAN
        cron: ${MARKET_MOMENTUM_CRON:0 */5 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "60"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
      - code: news-heat-aggregation
        type: NEWS_HEAT_AGGREGATION
        cron: ${NEWS_HEAT_CRON:45 */10 * * * *}
        zone: Asia/Shanghai
        parameters:
          windowMinutes: "1440"
          marketScope: CN_MAINLAND
          themes: ${HOT_INVESTMENT_KEYWORDS:AI人工智能=AI,人工智能,算力;半导体=半导体,芯片,集成电路;黄金=黄金,金价,贵金属}
          themeProducts: ${HOT_INVESTMENT_THEMES:AI人工智能=159819,588000,515980;半导体=512480,159995,688981;黄金=518880,159934}
