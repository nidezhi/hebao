spring:
  application:
    name: ai-wealth-platform
  datasource:
    druid:
      connection-init-sqls:
        - SET time_zone = '+08:00'

ai:
  secrets:
    values:
      OPENAI_MOCK_API_KEY: ${OPENAI_MOCK_API_KEY:}
      DEEPSEEK_MOCK_API_KEY: ${DEEPSEEK_MOCK_API_KEY:}
      QWEN_MOCK_API_KEY: ${QWEN_MOCK_API_KEY:}

# SpringDoc & Swagger UI 配置（生产环境禁用）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境默认关闭 Knife4j，避免无意暴露接口结构和调试入口。
knife4j:
  enable: false
