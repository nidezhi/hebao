spring:
  application:
    name: ai-wealth-platform
  config:
    # 生产环境私密配置统一维护在项目根目录 config/application-secrets.yaml。
    # 该文件已被 Git 忽略，不得将真实密钥写入版本库配置。
    import: optional:file:./config/application-secrets.yaml
  datasource:
    druid:
      connection-init-sqls:
        - SET time_zone = '+08:00'

# SpringDoc & Swagger UI 配置（生产环境禁用）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境默认关闭 Knife4j，避免无意暴露接口结构和调试入口。
knife4j:
  enable: false
